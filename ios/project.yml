name: OpenTask
options:
  bundleIdPrefix: io.mcnitt
  deploymentTarget:
    iOS: '17.0'
  xcodeVersion: '16.2'

settings:
  base:
    DEVELOPMENT_TEAM: GEL3VGTUJX
    CODE_SIGN_STYLE: Automatic

targets:
  OpenTask:
    type: application
    platform: iOS
    sources:
      - path: OpenTask
        excludes:
          - '*.entitlements'
      - path: Shared
    entitlements:
      path: OpenTask/OpenTask.entitlements
      properties:
        aps-environment: development
        com.apple.security.application-groups:
          - group.io.mcnitt.opentask
    dependencies:
      - target: OpenTaskNotification
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mcnitt.opentask
        INFOPLIST_KEY_UIBackgroundModes: remote-notification
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        MARKETING_VERSION: '1.0.0'
        CURRENT_PROJECT_VERSION: '2'
        INFOPLIST_KEY_UISupportedInterfaceOrientations: 'UIInterfaceOrientationPortrait'
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: 'UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight'
        SWIFT_VERSION: '5.9'
        GENERATE_INFOPLIST_FILE: true

  OpenTaskNotification:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenTaskNotification
        excludes:
          - '*.entitlements'
          - Info.plist
      - path: Shared
    dependencies:
      - sdk: UserNotificationsUI.framework
    entitlements:
      path: OpenTaskNotification/OpenTaskNotification.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.mcnitt.opentask
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mcnitt.opentask.notification
        SWIFT_VERSION: '5.9'
        INFOPLIST_FILE: OpenTaskNotification/Info.plist
        GENERATE_INFOPLIST_FILE: false
