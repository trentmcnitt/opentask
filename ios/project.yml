name: OpenTask
options:
  bundleIdPrefix: io.mcnitt
  deploymentTarget:
    iOS: '17.0'
    watchOS: '10.0'
  xcodeVersion: '16.2'

settings:
  base:
    DEVELOPMENT_TEAM: GEL3VGTUJX
    CODE_SIGN_STYLE: Automatic

targets:
  OpenTask:
    type: application
    platform: iOS
    sources:
      - path: OpenTask
        excludes:
          - '*.entitlements'
      - path: Shared
    info:
      path: OpenTask/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
        UILaunchScreen:
          UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: OpenTask/OpenTask.entitlements
      properties:
        aps-environment: development
        com.apple.developer.usernotifications.critical-alerts: true
        com.apple.security.application-groups:
          - group.io.mcnitt.opentask
    dependencies:
      - target: OpenTaskNotification
      - target: OpenTaskWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mcnitt.opentask
        MARKETING_VERSION: '1.0.0'
        CURRENT_PROJECT_VERSION: '2'
        SWIFT_VERSION: '5.9'

  OpenTaskNotification:
    type: app-extension
    platform: iOS
    sources:
      - path: OpenTaskNotification
        excludes:
          - '*.entitlements'
          - Info.plist
      - path: Shared
    dependencies:
      - sdk: UserNotificationsUI.framework
    entitlements:
      path: OpenTaskNotification/OpenTaskNotification.entitlements
      properties:
        com.apple.developer.usernotifications.critical-alerts: true
        com.apple.security.application-groups:
          - group.io.mcnitt.opentask
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mcnitt.opentask.notification
        SWIFT_VERSION: '5.9'
        INFOPLIST_FILE: OpenTaskNotification/Info.plist
        GENERATE_INFOPLIST_FILE: false

  OpenTaskWatch:
    type: application
    platform: watchOS
    sources:
      - path: OpenTaskWatch
        excludes:
          - '*.entitlements'
      - path: Shared
    info:
      path: OpenTaskWatch/Info.plist
      properties:
        UIBackgroundModes:
          - remote-notification
        WKApplication: true
        WKCompanionAppBundleIdentifier: io.mcnitt.opentask
    entitlements:
      path: OpenTaskWatch/OpenTaskWatch.entitlements
      properties:
        aps-environment: development
        com.apple.developer.usernotifications.critical-alerts: true
        com.apple.security.application-groups:
          - group.io.mcnitt.opentask
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.mcnitt.opentask.watchapp
        MARKETING_VERSION: '1.0.0'
        CURRENT_PROJECT_VERSION: '2'
        SWIFT_VERSION: '5.9'
